name: DeadClock
options:
  bundleIdPrefix: com.rjxznb
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
    macOS: "13.0"
  developmentLanguage: en
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    DEVELOPMENT_TEAM: Q3BK52FQT9
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    # Universal: iPhone + iPad. Portrait-only on iPad is allowed because
    # UIRequiresFullScreen opts out of multitasking (see Info.plist).
    TARGETED_DEVICE_FAMILY: "1,2"
    # Automatic signing — Xcode's Cloud Signing flow. CI uses
    # -allowProvisioningUpdates + ASC API key. We intentionally do NOT
    # set CODE_SIGN_IDENTITY; forcing it conflicts with Automatic mode.
    CODE_SIGN_STYLE: Automatic
    SWIFT_EMIT_LOC_STRINGS: NO
  configs:
    Debug:
      ENABLE_TESTABILITY: YES
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

targets:
  DeadClock:
    type: application
    platform: iOS
    sources:
      - path: DeadClock
        excludes:
          - "Info.plist"
    resources:
      - DeadClock/Assets.xcassets
    dependencies:
      - target: DeadClockWidget
      - target: DeadClockWatch
    entitlements:
      path: DeadClock/DeadClock.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rjxznb.deadclock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rjxznb.deadclock
    info:
      path: DeadClock/Info.plist
      properties:
        CFBundleDisplayName: OneLife
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Portrait-only is allowed iff the app opts out of iPad
        # multitasking; without this Apple rejects with ITMS-90474.
        UIRequiresFullScreen: true
        NSPhotoLibraryAddUsageDescription: OneLife saves your posters to the photo album.
        ITSAppUsesNonExemptEncryption: false

  DeadClockMac:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: DeadClockMac
        excludes:
          - "Info.plist"
      - path: DeadClock/Shared/DeathClock.swift
    resources:
      - DeadClockMac/Assets.xcassets
    entitlements:
      path: DeadClockMac/DeadClockMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rjxznb.deadclock
    info:
      path: DeadClockMac/Info.plist
      properties:
        CFBundleDisplayName: OneLife
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.productivity
        ITSAppUsesNonExemptEncryption: false

  DeadClockWatch:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: DeadClockWatch
        excludes:
          - "Info.plist"
      - path: DeadClock/Shared/DeathClock.swift
    resources:
      - DeadClockWatch/Assets.xcassets
    dependencies:
      - target: DeadClockWatchWidget
    entitlements:
      path: DeadClockWatch/DeadClockWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rjxznb.deadclock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rjxznb.deadclock.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
    info:
      path: DeadClockWatch/Info.plist
      properties:
        CFBundleDisplayName: OneLife
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.rjxznb.deadclock
        WKRunsIndependentlyOfCompanionApp: true

  DeadClockWatchWidget:
    type: app-extension
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: DeadClockWatchWidget
        excludes:
          - "Info.plist"
      - path: DeadClock/Shared/DeathClock.swift
    entitlements:
      path: DeadClockWatchWidget/DeadClockWatchWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rjxznb.deadclock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rjxznb.deadclock.watchkitapp.widget
        TARGETED_DEVICE_FAMILY: "4"
        SKIP_INSTALL: YES
    info:
      path: DeadClockWatchWidget/Info.plist
      properties:
        CFBundleDisplayName: OneLife
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  DeadClockWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: DeadClockWidget
        excludes:
          - "Info.plist"
      - path: DeadClock/Shared
    entitlements:
      path: DeadClockWidget/DeadClockWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rjxznb.deadclock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rjxznb.deadclock.widget
        SKIP_INSTALL: YES
    info:
      path: DeadClockWidget/Info.plist
      properties:
        CFBundleDisplayName: OneLife
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
