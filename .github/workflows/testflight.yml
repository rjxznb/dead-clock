name: TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: testflight
  cancel-in-progress: false   # never cancel an upload in flight

jobs:
  upload:
    name: Archive + Upload to TestFlight
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Generate .xcodeproj
        run: xcodegen generate --quiet

      - name: Write ASC API key to disk
        env:
          ASC_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          # Safety check: empty secret → printf creates empty .p8 → downstream
          # xcodebuild fails with cryptic "flag -authenticationKeyID is required"
          # even though the flag IS in the command. Catch it here loudly.
          if [ -z "$ASC_API_KEY_P8" ] || [ -z "$ASC_KEY_ID" ]; then
            echo "::error::APP_STORE_CONNECT_API_KEY_P8 or _KEY_ID secret is empty"
            exit 1
          fi
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_API_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          BYTES=$(wc -c < ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8)
          if [ "$BYTES" -lt 200 ]; then
            echo "::error::AuthKey .p8 is only $BYTES bytes — secret content is malformed"
            exit 1
          fi
          cp ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 $RUNNER_TEMP/AuthKey.p8

      - name: Prune cloud-managed certificates (quota guard)
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Cloud signing mints a fresh "Created via API" certificate on every
          # run; the team quota fills after ~10 builds and archiving dies with
          # a misleading "choose a certificate to revoke" error. Revoke them
          # all up front — the run then mints one clean new certificate.
          b64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }
          H=$(printf '{"alg":"ES256","kid":"%s","typ":"JWT"}' "$ASC_KEY_ID" | b64url)
          NOW=$(date +%s)
          P=$(printf '{"iss":"%s","iat":%d,"exp":%d,"aud":"appstoreconnect-v1"}' "$ASC_ISSUER_ID" "$NOW" $((NOW+1100)) | b64url)
          printf '%s.%s' "$H" "$P" | openssl dgst -sha256 -sign "$RUNNER_TEMP/AuthKey.p8" -binary > /tmp/sig.der
          RS=$(openssl asn1parse -inform DER -in /tmp/sig.der | sed -n 's/.*INTEGER *://p')
          R=$(echo "$RS" | sed -n 1p); S=$(echo "$RS" | sed -n 2p)
          R=${R#00}; S=${S#00}
          R=$(printf '%064s' "$R" | tr ' ' 0); S=$(printf '%064s' "$S" | tr ' ' 0)
          SIG=$(printf '%s%s' "$R" "$S" | xxd -r -p | b64url)
          TOKEN="$H.$P.$SIG"
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.appstoreconnect.apple.com/v1/certificates?limit=200" -o /tmp/certs.json
          IDS=$(grep -B6 '"Created via API"' /tmp/certs.json | grep '"id"' | sed 's/.*: "\(.*\)".*/\1/' | sort -u)
          for ID in $IDS; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' -X DELETE \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.appstoreconnect.apple.com/v1/certificates/$ID")
            echo "revoked $ID ($CODE)"
          done

      - name: Set CURRENT_PROJECT_VERSION = run_number + 100
        run: |
          # Each TestFlight upload needs a unique (version, build) pair.
          # +100 offset gives headroom if you ever do manual uploads outside CI.
          BUILD_NUM=$((${{ github.run_number }} + 100))
          echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild \
            -project DeadClock.xcodeproj \
            -scheme DeadClock \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./build/DeadClock.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            CURRENT_PROJECT_VERSION=$BUILD_NUM \
            DEVELOPMENT_TEAM=Q3BK52FQT9 \
            archive | xcbeautify

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild \
            -exportArchive \
            -archivePath ./build/DeadClock.xcarchive \
            -exportPath ./build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" | xcbeautify

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail
          IPA=$(find ./build/export -name "*.ipa" | head -1)
          UPLOAD_LOG=$(mktemp)
          # altool exits 0 even when validation fails (daily upload limit,
          # duplicate build, missing icon, etc.). Tee + check for the final
          # success marker; transient "ERROR:" lines from retried requests
          # (e.g. one-off HTTP 500s) must not fail an upload that succeeded.
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" 2>&1 | tee "$UPLOAD_LOG"
          if grep -qE "Validation failed|UPLOAD FAILED|Upload limit reached" "$UPLOAD_LOG"; then
            echo "::error::altool reported a validation/upload error"
            exit 1
          fi
          if ! grep -q "UPLOAD SUCCEEDED" "$UPLOAD_LOG"; then
            echo "::error::altool did not confirm a successful upload"
            exit 1
          fi

      - name: Upload archive artifact (for forensics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcarchive-${{ github.sha }}
          path: build/DeadClock.xcarchive
          retention-days: 7

  upload-macos:
    name: Archive + Upload macOS to TestFlight
    runs-on: macos-15
    # Runs after the iOS job so the certificate prune step never races
    # with this job's own signing.
    needs: upload
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Generate .xcodeproj
        run: xcodegen generate --quiet

      - name: Write ASC API key to disk
        env:
          ASC_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          if [ -z "$ASC_API_KEY_P8" ] || [ -z "$ASC_KEY_ID" ]; then
            echo "::error::APP_STORE_CONNECT_API_KEY_P8 or _KEY_ID secret is empty"
            exit 1
          fi
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_API_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          cp ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 $RUNNER_TEMP/AuthKey.p8

      - name: Set CURRENT_PROJECT_VERSION = run_number + 100
        run: |
          BUILD_NUM=$((${{ github.run_number }} + 100))
          echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV

      - name: Archive macOS
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild \
            -project DeadClock.xcodeproj \
            -scheme DeadClockMac \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath ./build/DeadClockMac.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            CURRENT_PROJECT_VERSION=$BUILD_NUM \
            DEVELOPMENT_TEAM=Q3BK52FQT9 \
            archive | xcbeautify

      - name: Export macOS pkg
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild \
            -exportArchive \
            -archivePath ./build/DeadClockMac.xcarchive \
            -exportPath ./build/export-mac \
            -exportOptionsPlist ExportOptionsMac.plist \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" | xcbeautify

      - name: Upload macOS build to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail
          PKG=$(find ./build/export-mac -name "*.pkg" | head -1)
          if [ -z "$PKG" ]; then
            echo "::error::No .pkg produced by export"
            exit 1
          fi
          UPLOAD_LOG=$(mktemp)
          xcrun altool --upload-app \
            -f "$PKG" \
            -t macos \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" 2>&1 | tee "$UPLOAD_LOG"
          if grep -qE "Validation failed|UPLOAD FAILED|Upload limit reached" "$UPLOAD_LOG"; then
            echo "::error::altool reported a validation/upload error"
            exit 1
          fi
          if ! grep -q "UPLOAD SUCCEEDED" "$UPLOAD_LOG"; then
            echo "::error::altool did not confirm a successful upload"
            exit 1
          fi
